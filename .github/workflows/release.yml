name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Run tests
        run: go test -race -coverprofile=coverage.out -coverpkg=./internal/... ./...
      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "Coverage: ${COVERAGE}%"
          awk -v c="$COVERAGE" 'BEGIN { exit (c >= 80 ? 0 : 1) }'
      - name: Run E2E tests
        run: go test -race ./e2e/...

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="${LDFLAGS}" -o dist/filter-proxy-linux-amd64 ./cmd/filter-proxy
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="${LDFLAGS}" -o dist/filter-proxy-linux-arm64 ./cmd/filter-proxy
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="${LDFLAGS}" -o dist/filter-proxy-darwin-amd64 ./cmd/filter-proxy
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="${LDFLAGS}" -o dist/filter-proxy-darwin-arm64 ./cmd/filter-proxy

          cd dist && sha256sum * > checksums.txt

      - name: Build Docker image
        run: |
          docker build -t filter-proxy:${GITHUB_REF_NAME} .
          docker tag filter-proxy:${GITHUB_REF_NAME} ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME}
          docker tag filter-proxy:${GITHUB_REF_NAME} ghcr.io/${{ github.repository }}:latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME}
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/filter-proxy-linux-amd64
            dist/filter-proxy-linux-arm64
            dist/filter-proxy-darwin-amd64
            dist/filter-proxy-darwin-arm64
            dist/checksums.txt
